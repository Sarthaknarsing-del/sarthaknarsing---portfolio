<!DOCTYPE html>
<html lang="en">
<head>
    <title>Contact - Sarthak Narsing</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #0f172a;
            color: white;
        }

        .container {
            width: 85%;
            margin: auto;
            padding: 50px 0;
            text-align: center;
        }

        h1 {
            color: #38bdf8;
        }

        p {
            color: #cbd5f5;
        }

        /* CONTACT BOX */
        .contact-box {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            margin-top: 30px;
        }

        /* EMAIL */
        .email {
            font-size: 18px;
            margin: 20px 0;
        }

        .email a {
            color: #38bdf8;
            text-decoration: none;
        }

        .email a:hover {
            text-decoration: underline;
        }

        /* SOCIAL LINKS */
        .socials {
            margin-top: 25px;
        }

        .socials a {
            display: inline-block;
            margin: 10px;
            padding: 10px 18px;
            background: #334155;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        .socials a:hover {
            background: #38bdf8;
            color: black;
        }

        /* FORM */
        .form {
            margin-top: 40px;
        }

        .form input, .form textarea {
            width: 80%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        .form textarea {
            height: 120px;
        }

        .form button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            background: #38bdf8;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .form button:hover {
            background: #0ea5e9;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Contact Me</h1>
    <p>Let's connect and build something impactful together.</p>

    <div class="contact-box">

        <!-- EMAIL -->
        <div class="email">
            📧 Email: 
            <a href="mailto:sarthaknarsing101@gmail.com">
                sarthaknarsing101@gmail.com
            </a>
        </div>

        <!-- SOCIAL LINKS -->
        <div class="socials">
            <a href="https://github.com/sarthak13" target="_blank">GitHub</a>
            <a href="https://instagram.com/sarthak_narsing" target="_blank">Instagram</a>
            <a href="https://linkedin.com/in/sarthaknarsing" target="_blank">LinkedIn</a>
        </div>

        <!-- CONTACT FORM -->
        <div class="form">
            <input type="text" placeholder="Your Name" required><br>
            <input type="email" placeholder="Your Email" required><br>
            <textarea placeholder="Your Message" required></textarea><br>
            <button>Send Message</button>
        </div>

    </div>

</div>

</body>
</html>
